<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nokto Studio — Digital Marketing Agency</title>
  <meta name="description" content="Nokto Studio — hybrid digital marketing agency based in Slovakia. We work in the dark. Your results speak in the light.">
  <link rel="canonical" href="https://noktostudio.com/">
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1A1A2E;
      --bg-2: #16213E;
      --accent: #6C63FF;
      --accent-hover: #5B52EE;
      --accent-light: #C4C0F0;
      --text: #FFFFFF;
      --text-2: #C4C0F0;
      --text-muted: rgba(196, 192, 240, 0.5);
      --border: rgba(108, 99, 255, 0.2);
      --border-light: rgba(255, 255, 255, 0.06);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 14px;
      --radius-lg: 24px;
      --shadow-accent: 0 4px 28px rgba(108,99,255,0.28);
      --t: 0.25s ease;
    }
    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lang-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      width: 100%;
      max-width: 520px;
      text-align: center;
    }
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .brand-logo {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      text-decoration: none;
    }
    .brand-logo .logo-n {
      color: var(--accent);
    }
    .brand-tagline {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
      margin: 0 auto;
    }
    .lang-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
    }
    .lang-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 32px 24px;
      background: rgba(22, 33, 62, 0.6);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      text-decoration: none;
      color: var(--text);
      transition: border-color var(--t), box-shadow var(--t), transform var(--t);
      backdrop-filter: blur(8px);
    }
    .lang-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-accent);
      transform: translateY(-3px);
    }
    .lang-flag {
      font-size: 2.2rem;
      line-height: 1;
    }
    .lang-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .lang-card p {
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .footer-note {
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    @media (max-width: 400px) {
      .lang-cards { grid-template-columns: 1fr; max-width: 260px; }
    }
  </style>
</head>
<body>
  <main class="lang-page">
    <div class="brand">
      <a href="#" class="brand-logo"><span class="logo-n">N</span>okto Studio</a>
      <div class="divider"></div>
      <p class="brand-tagline">We work in the dark. Your results speak in the light.</p>
    </div>
    <div class="lang-cards">
      <a href="/en/" class="lang-card">
        <span class="lang-flag">🇬🇧</span>
        <h2>English</h2>
        <p>Continue in English</p>
      </a>
      <a href="/sk/" class="lang-card">
        <span class="lang-flag">🇸🇰</span>
        <h2>Slovensky</h2>
        <p>Pokračovať po slovensky</p>
      </a>
    </div>
    <p class="footer-note">© 2025 Nokto Studio. Slovakia — International thinking.</p>
  </main>
</body>
</html>
