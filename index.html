<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="assets/css/main.css" />

  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

<body>
  <main class="lang-select-page">

    <!-- Logo -->
    <a href="#" class="logo" aria-label="TechGen">

        <circle cx="14" cy="19" r="9" fill="#6C63FF"/>
